name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # 本番ターゲットは Windows（kabuステーションがWindows専用）。
        # Linux でも基本動作を担保するため両方で実行する。
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash  # Windowsでも bash（grep/パイプ）を使えるようにする
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # pandas-ta==0.3.14b0 は PyPI で Python 3.11 向けに未配布のため除外する。
        # テスト環境では conftest.py がスタブを注入するため不要。
        # Windows ネイティブの pip.exe は /dev/stdin を解釈できないため、
        # 実ファイルに書き出してから -r で渡す（OS非依存にする）。
        run: |
          grep -v '^pandas-ta' requirements.txt > requirements.ci.txt
          pip install -r requirements.ci.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
