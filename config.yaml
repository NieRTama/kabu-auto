kabu_station:
  base_url: "http://localhost:18080/kabusapi"
  # APIパスワードは config.yaml に書かず、必ず .env の KABU_API_PASSWORD で設定する
  # （平文での誤コミット・漏洩防止）。.env.example を参照。
  token_refresh_time: "08:30"  # 毎朝トークン再取得

trading:
  # 取引モード:
  #   paper     = 仮想取引（実APIへ発注せず終値で即時シミュレート）
  #   live      = 本番（実際の資金で実APIへ発注）
  #   dry_run   = 実APIから板/余力は読むが発注はしない（DRY_RUNとして記録のみ・検証用）
  #   semi_live = 計画注文を承認キューに積み、ダッシュボードで承認した分だけ実発注
  # live / semi_live は起動に環境変数 CONFIRM_LIVE_TRADING=true が必要。
  mode: "paper"
  max_positions: 5  # 最大同時保有銘柄数
  max_position_ratio: 0.25  # 1銘柄あたり最大資金比率 (25%)
  stop_loss_pct: -0.07  # 損切りライン (-7%)
  max_sector_ratio: 0.40  # 同一セクター最大集中率
  order_timeout_seconds: 300  # 未約定注文のキャンセルまでの秒数
  daily_order_limit: 100  # 1日の最大注文数
  max_daily_loss: 30000  # 当日損失上限（円）。0 で無効
  paper_initial_capital: 500000  # ペーパーモードの初期資金（円）。発注サイズ算定の基準
  # ※ max_positions / max_position_ratio / stop_loss_pct / max_sector_ratio / max_daily_loss は
  #    アクティブな risk_profile（下記）の値で起動時・切替時に上書きされる。
  # ウォッチリスト・銘柄名は watchlists.json で管理する（複数リスト対応。ダッシュボードのGUIから追加・削除・切替可能）

# ─── リスクプロファイル ────────────────────────────────────────────────────
# 日次の成績を見て「ハイリスク・ハイリターン」⇔「ローリスク・ローリターン」の
# 2択をダッシュボードから切り替えられる。アクティブなプロファイルは risk_profile.json に
# 永続化され、各プロファイルの値が trading / strategy の該当パラメータを上書きする。
# 既定はローリスク側（live運用に進んだ場合の安全側デフォルト）。
active_risk_profile: "low_risk"  # 起動時の既定（risk_profile.json があればそちら優先）
risk_profiles:
  low_risk:    # ローリスク・ローリターン：小さく張り、早めに損切り、広く分散、強いシグナルのみ
    max_position_ratio: 0.12   # 1銘柄最大12%（資金を多めに分散）
    stop_loss_pct: -0.04       # -4%で早めに損切り（被弾を小さく抑える）
    max_positions: 6           # 多めの銘柄数に分散してポジション集中を避ける
    max_sector_ratio: 0.30     # セクター集中を厳しく制限
    max_daily_loss: 15000      # 当日損失上限を低く設定
    # 閾値は実際の combined_score 分布（過去実績: 平均0.043・標準偏差0.043）に基づき再調整。
    # 0.14 ≈ 平均+2.3σ で、high_risk より明確に選別的（=取引頻度を抑える）。
    buy_threshold: 0.14
    sell_threshold: -0.14
  high_risk:   # ハイリスク・ハイリターン：大きく張り、損切りを広げて伸ばし、集中投資・高頻度取引
    max_position_ratio: 0.35   # 1銘柄最大35%（集中投資でリターンを狙う）
    stop_loss_pct: -0.10       # -10%まで許容し、値動きの伸びを取りやすくする
    max_positions: 4           # 銘柄数を絞り1銘柄あたりの規模を大きくする
    max_sector_ratio: 0.55     # セクター集中の制約を緩める
    max_daily_loss: 60000      # 当日損失上限を高く設定（その分ドローダウン許容度も上がる）
    # 0.08 ≈ 平均+0.8σ。旧値0.18は実際のスコア値域（最大0.074。2026-06時点の実績）を
    # 大きく超えており取引が一切発生しなかったため、実測分布に合わせて引き下げた。
    buy_threshold: 0.08
    sell_threshold: -0.08

strategy:
  ma_short: 5
  ma_mid: 25
  ma_long: 75
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  bb_period: 20
  bb_std: 2.0
  ml_weight: 0.5  # MLシグナルの重み (0.0-1.0)
  rule_weight: 0.5  # ルールベースシグナルの重み
  buy_threshold: 0.25  # 買いシグナル閾値（合成スコアは rule/ml を重み付き平均するため実効レンジは約±0.3。0.25 ≈ 平均+2.2σ）
  sell_threshold: -0.25  # 売りシグナル閾値
  # トリプルバリア法ラベリング（López de Prado）
  tb_profit_mult: 2.0  # 利益確定バリア = 終値 ×(1 + mult × ボラティリティ)
  tb_stop_mult: 2.0    # 損切りバリア   = 終値 ×(1 - mult × ボラティリティ)
  tb_max_holding: 10   # 時間バリア（最大保有日数、スイング想定）
  tb_vol_span: 20      # ボラティリティ推定の指数加重期間
  # MLモデルのSHA256メタ情報が無い（旧モデル/初回移行）場合でもロードを許可するか。
  # 既定 false = fail-closed（メタが無ければロード拒否。改ざん検知の迂回を防ぐため）。
  # 既存モデルを一度だけ移行したい場合のみ true にし、移行後は false に戻すこと。
  allow_unverified_model_load: false

# ─── 流動性フィルタ（レビュー P0-6）──────────────────────────────────────────
# 薄商い銘柄への新規BUYは「約定しない/不利約定/退出時に売り抜けられない」リスクが
# 高いため、直近の平均売買代金などで足切りする。閾値0で無効（既定）。
# 実運用では銘柄ユニバースに合わせて有効化することを推奨（例: 5000万円）。
liquidity:
  min_avg_turnover_yen: 0      # 直近平均売買代金の下限（円）。0で無効。例: 50000000
  avg_window: 20               # 平均を取る日数
  max_spread_ratio: 0          # 板スプレッド許容率((ask-bid)/mid)。live/dry_runのみ。0で無効。例: 0.01
  # 大引け前のこの分数は新規BUYを見送る（薄商い・引け間際の不利約定回避）。0で無効。
  no_new_buy_minutes_before_close: 0

runtime:
  # 同一PCでの多重起動を検知した際の挙動（再レビュー対応）。
  # paper 以外（dry_run/semi_live/live）は安全のため常に起動を中断する。
  # paper は実資金リスクは無いが、DB・ログ・バックテスト結果・ダッシュボード状態の
  # 汚染リスクがあるため既定では中断する。意図的に複数のpaperインスタンスを
  # 同時起動したい場合のみ true にする。
  allow_multiple_paper_instances: false

backtest:
  # 理想約定を仮定したバックテストは実運用と乖離する。約定価格へ不利方向に加える
  # 片道スリッページ率・片道手数料率を控除した「実運用に近い」成績を出す（レビュー ML）。
  slippage_pct: 0.001    # 片道スリッページ率（0.1%）
  commission_pct: 0.0    # 片道手数料率（ネット証券の現物は無料前提。必要に応じ設定）

data:
  db_path: "data/kabu_auto.db"
  backup_dir: "data/backups"
  history_years: 7  # 取得する過去データ年数

dashboard:
  host: "0.0.0.0"  # LAN内の他端末からもアクセスする運用のため0.0.0.0（LAN公開時はログイン認証が有効化される）
  port: 8080
  # ダッシュボードのアクセストークン。空でも host が 127.0.0.1 なら認証なし（ローカル専用）。
  # host を 0.0.0.0 にすると（=LAN公開）、未設定でも起動時にトークンを自動生成して認証を強制する。
  # 環境変数 KABU_DASHBOARD_TOKEN でも指定可能。恒久運用ではここに固定値を設定すること。
  api_token: ""
  emergency_token: ""  # 緊急決済用。空の場合は起動時にランダム生成してコンソールに一度だけ表示
  # ログイン認証（認証が有効な構成のとき使用）。認証情報は data/auth.json に
  # PBKDF2ハッシュで保存される（初回はブラウザのログイン画面で作成）。
  auth_file: "data/auth.json"
  session_ttl_hours: 168  # ログインセッションの有効期間（時間。既定7日）
  # Cookie に Secure 属性を付与するか。HTTPS（リバースプロキシ等）経由で運用する場合は
  # true にする。素のHTTP（LAN内直アクセス）では Secure を付けるとCookieが送られず
  # ログインできなくなるため false。既定 false。
  cookie_secure: false

alerts:
  # Discord Webhook URL（任意）。設定すると取引情報がDiscordへ送信される。
  # 環境変数 DISCORD_WEBHOOK_URL でも指定可能（平文をconfigに残さないため推奨）。
  # 取得方法: Discordのチャンネル設定 → 連携サービス → ウェブフック → 新しいウェブフック
  #          → 「ウェブフックURLをコピー」。このURL自体が秘密情報のため、
  #          コピー後は他者に共有せず、ここに直接書く場合も誤コミットに注意（.envを推奨）。
  # 詳細: docs/通知設定ガイド.md
  discord_webhook_url: ""
  # 将来 Slack/Telegram/email 等を追加する場合は、ここに provider 別のキーを追記し、
  # src/core/alerts.py の build_providers() に対応する分岐を1つ追加する。
  # 例: slack_webhook_url: ""

logging:
  level: "INFO"
  # ログは log/ フォルダに格納され、1日単位で区切られ、ファイル名末尾に日付が付く。
  # INFO以下（DEBUG/INFO）と WARNING以上（WARNING/ERROR/CRITICAL）を別ファイルに分ける。
  # 例: log/kabu_auto_2026-06-18.log（INFO以下） / log/kabu_auto_warning_2026-06-18.log（WARNING以上）
  file: "log/kabu_auto.log"
  retention: "15 days"  # ログの保持期間（この周期で古いログを自動削除）
